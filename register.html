<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register for a Course</title>
</head>
<body>
    <center>
    <h1>Error Makes Clever Academy</h1>
    <h4>Training | Tech news | Freshers Guide</h4>
    <p>Empowering young developers to develop their skills through Training in software development technologies!</p>
    </center>
    <hr>
    <center>
        <h2>Registration Form</h2>
    </center>
    <center>

    <form>
    <table>
        <tr>
            <td>Name:</td> <td><input type="text" placeholder="Enter your name"></td>
        </tr>
        <tr>
            <td>Age:</td> <td><input type="number" placeholder="Enter your age"></td>
        </tr>
        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" name="gender" > Male
                <input type="radio" name="gender" > Female
            </td>
        </tr>
        <tr>
            <td>Email:</td><td><input type="text" placeholder="Enter your Email"></td>
        </tr>
        <tr>
            <td>Select course:</td>
            <td>
               <select>
                <option>Full stack web development</option>
                <option>Data Science</option>
                <option>Cloud Computing</option>
               </select>
            </td>
        </tr>
        <tr>
            <td>Upload your resume:</td>
            <td><input type="file" accept=".pdf,.doc,.docx"></td>
        </tr>
        <tr>
            <td><input type="Reset"></td><td><input type="Submit"></td>
        </tr>
    </table>
    </form>
    </center>

            <a href="index.html">Home</a> <a href="https://www.instagram.com/errormakesclever" >Instagram</a><a href="https://www.youtube.com/@ErrorMakesClever">Youtube</a>
        </p>

    </center>
    <hr>
    
</body>
</html>
